app = "ollama-fastapi-railway-deployment-qst2ba"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  OLLAMA_HOST = "http://localhost:11434"
  OLLAMA_MODELS = "/root/.ollama/models"
  OLLAMA_KEEP_ALIVE = "-1"
  OLLAMA_NOPRUNE = "1"
  DATABASE_URL = "postgresql://neondb_owner:npg_1imPJgOw5qBc@ep-divine-fog-ajro56fz-pooler.c-3.us-east-2.aws.neon.tech/neondb?sslmode=require"

[processes]
  qwen = "/start.sh"
  tinyllama = "/start.sh"
  llama3 = "/start.sh"
  phi3 = "/start.sh"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 4
  processes = ["qwen", "tinyllama", "llama3", "phi3"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "10s"
    grace_period = "30s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = "4gb"
  cpu_kind = "shared"
  cpus = 4

[[mounts]]
  source = "ollama_data"
  destination = "/root/.ollama"
  processes = ["qwen", "tinyllama", "llama3", "phi3"]
