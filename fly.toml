app = "ollama-fastapi-railway-deployment"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  DEFAULT_MODEL = "qwen2.5:0.5b"
  OLLAMA_HOST = "http://localhost:11434"
  OLLAMA_MODELS = "/root/.ollama/models"

[[services]]
  internal_port = 8000
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.http_checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "60s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = "2048"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "ollama_data"
  destination = "/root/.ollama"
