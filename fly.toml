app = "ollama-fastapi-railway-deployment"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  DEFAULT_MODEL = "qwen2.5:0.5b"
  OLLAMA_HOST = "http://localhost:11434"
  OLLAMA_MODELS = "/root/.ollama/models"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[services]]
  protocol = "tcp"
  internal_port = 8000
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "60s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = "2048"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "ollama_data"
  destination = "/root/.ollama"
