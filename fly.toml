app = "ollama-fastapi-railway-deployment"

[build]
  dockerfile = "Dockerfile"

[env]
  OLLAMA_HOST = "http://localhost:11434"
  OLLAMA_MODELS = "/root/.ollama/models"
  DATABASE_URL = "postgresql://neondb_owner:npg_1imPJgOw5qBc@ep-divine-fog-ajro56fz-pooler.c-3.us-east-2.aws.neon.tech/Dailymotion%20?sslmode=require&channel_binding=require"

[processes]
  qwen = "/start.sh"
  tinyllama = "/start.sh"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["qwen", "tinyllama"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "10s"
    grace_period = "60s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = "2048"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "ollama_data"
  destination = "/root/.ollama"
  processes = ["qwen", "tinyllama"]
