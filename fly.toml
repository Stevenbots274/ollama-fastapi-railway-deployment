app = "ollama-fastapi-railway-deployment"
# primary_region removed to allow dynamic selection

[build]
  dockerfile = "Dockerfile"

[env]
  DEFAULT_MODEL = "qwen2.5:0.5b"
  OLLAMA_HOST = "http://localhost:11434"
  OLLAMA_MODELS = "/root/.ollama/models"
  DATABASE_URL = "postgresql://neondb_owner:npg_1imPJgOw5qBc@ep-divine-fog-ajro56fz-pooler.c-3.us-east-2.aws.neon.tech/Dailymotion%20?sslmode=require"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "30s"
    grace_period = "120s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = "2048"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "ollama_data"
  destination = "/root/.ollama"
