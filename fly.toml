app = 'ollama-fastapi-railway-deployment'
primary_region = 'lax'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '4gb'
  cpu_kind = 'shared'
  cpus = 2

[[mounts]]
  source = 'ollama_data'
  destination = '/root/.ollama'
  initial_size = '20gb'

[env]
  DEFAULT_MODEL = 'tinyllama:latest'
  OLLAMA_HOST = 'http://localhost:11434'
  MASTER_KEY = 'senseiphoenix'
