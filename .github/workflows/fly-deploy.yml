name: Fly Deploy
on:
  push:
    branches:
      - main
jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      
      - name: Dynamic Volume and Region Management
        run: |
          echo "Determining target region..."
          # If a machine already exists, we'll use its region. 
          # Otherwise, we'll default to 'iad' but ensure a 10GB volume exists there.
          
          TARGET_REGION=$(flyctl status --json | python3 -c "import sys, json; data=json.load(sys.stdin); machines=data.get('Machines', []); print(machines[0]['region'] if machines else 'iad')")
          echo "Target region is: $TARGET_REGION"

          echo "Cleaning up any 1GB volumes..."
          VOLUMES_JSON=$(flyctl volumes list -a ollama-fastapi-railway-deployment --json)
          echo "$VOLUMES_JSON" | python3 -c "
          import sys, json, subprocess
          vols = json.load(sys.stdin)
          for v in vols:
              if v.get('SizeGb') < 10:
                  print(f'Destroying small volume {v[\"id\"]} ({v[\"SizeGb\"]}GB)...')
                  subprocess.run(['flyctl', 'volumes', 'destroy', v['id'], '-a', 'ollama-fastapi-railway-deployment', '--yes'])
          "

          echo "Ensuring 10GB volume exists in $TARGET_REGION..."
          VOLUME_EXISTS=$(flyctl volumes list -a ollama-fastapi-railway-deployment --json | python3 -c "import sys,json; vols=json.load(sys.stdin); print(any(v.get('Region')=='$TARGET_REGION' and v.get('SizeGb')==10 for v in vols))")
          
          if [ "$VOLUME_EXISTS" = "False" ]; then
            echo "Creating 10GB volume in $TARGET_REGION..."
            flyctl volumes create ollama_data --region "$TARGET_REGION" --count 1 --size 10 --yes -a ollama-fastapi-railway-deployment
          else
            echo "10GB volume already exists in $TARGET_REGION."
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --ha=false -a ollama-fastapi-railway-deployment --wait-timeout 400
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
