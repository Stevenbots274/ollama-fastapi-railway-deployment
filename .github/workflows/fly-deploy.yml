name: Fly Deploy
on:
  push:
    branches:
      - main
jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Create volumes if they don't exist
        run: |
          echo "Checking for existing volumes..."
          VOLUME_COUNT=$(flyctl volumes list -a ollama-fastapi-railway-deployment --json 2>/dev/null | python3 -c "import sys,json; vols=json.load(sys.stdin); print(len([v for v in vols if v.get('Name')=='ollama_data' and v.get('Region')=='iad']))" 2>/dev/null || echo "0")
          echo "Found $VOLUME_COUNT existing ollama_data volumes in iad"
          if [ "$VOLUME_COUNT" -lt "1" ]; then
            echo "Creating 1 volume in iad..."
            flyctl volumes create ollama_data --region iad --count 1 --size 10 --yes -a ollama-fastapi-railway-deployment
          else
            echo "Volume already exists. Skipping creation."
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --ha=false -a ollama-fastapi-railway-deployment --wait-timeout 300
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
